services:

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1a
      - app1b
      - app2

  app1a:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./app1:/app
    command: python server.py

  app1b:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./app1:/app
    command: python server.py

  app2:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./app2:/app
    command: python server.py